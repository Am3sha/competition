[build]
  command = "npm install"
  functions = "netlify/functions"
  publish = "public"

[build.environment]
  NODE_VERSION = "20"  

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["express", "@supabase/supabase-js", "multer", "cors", "serverless-http"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true